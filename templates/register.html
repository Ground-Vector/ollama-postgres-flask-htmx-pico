{% extends "base.html" %}

{% block content %}
{% for prompt in prompts %}
    <article>
        <header>{{ prompt['prompt'] }}</header>
        <pre>{{ prompt['response'] }}</pre>
    </article>
{% endfor %}
<form>
    <fieldset role="group">
        <input type="text" name="name" placeholder="Name">
        <input type="submit" hx-post="register" value="Register">
    </fieldset>
</form>
{% endblock %}
